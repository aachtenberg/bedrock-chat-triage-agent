<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Bedrock Knowledge Chat</title>
  <style>
    :root {
      --bg: #f3efe6;
      --panel: rgba(255, 252, 247, 0.86);
      --ink: #1f2933;
      --muted: #5d6a72;
      --line: rgba(31, 41, 51, 0.1);
      --accent: #0d5c63;
      --accent-soft: #d5ebe6;
      --shadow: 0 24px 60px rgba(23, 40, 53, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(13, 92, 99, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(199, 138, 69, 0.18), transparent 28%),
        linear-gradient(180deg, #f7f1e7 0%, #ece5d8 100%);
      padding: 32px 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 40px 36px 36px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .eyebrow {
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2rem;
      line-height: 1.1;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    input {
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .error {
      color: #c0392b;
      font-size: 0.85rem;
      min-height: 1.2em;
      display: none;
    }

    .error.visible {
      display: block;
    }

    button[type="submit"] {
      margin-top: 4px;
      padding: 12px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button[type="submit"]:hover { opacity: 0.88; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="eyebrow">Bedrock Chat</span>
      <h1>Sign in</h1>
      <p class="subtitle">Enter your credentials to access the knowledge base chat.</p>
    </div>

    <form id="login-form" novalidate>
      <label>
        Username
        <input id="username" type="text" autocomplete="username" spellcheck="false" required>
      </label>
      <label>
        Password
        <input id="password" type="password" autocomplete="current-password" required>
      </label>
      <p class="error" id="error-msg">Incorrect username or password.</p>
      <button type="submit" id="submit-btn">Sign in</button>
    </form>
  </div>

  <script>
    // If already authenticated, skip the login page
    (function () {
      var cookies = document.cookie.split(';');
      for (var i = 0; i < cookies.length; i++) {
        if (cookies[i].trim().startsWith('_auth=')) {
          window.location.replace('/');
          return;
        }
      }
    }());

    var form    = document.getElementById('login-form');
    var userEl  = document.getElementById('username');
    var passEl  = document.getElementById('password');
    var errorEl = document.getElementById('error-msg');
    var btn     = document.getElementById('submit-btn');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errorEl.classList.remove('visible');
      btn.disabled = true;

      var username = userEl.value.trim();
      var password = passEl.value;

      if (!username || !password) {
        errorEl.textContent = 'Please enter both username and password.';
        errorEl.classList.add('visible');
        btn.disabled = false;
        return;
      }

      var token = btoa(username + ':' + password);
      var cookieValue = 'Basic ' + token;

      // Probe a protected resource with the candidate credentials before committing.
      // Use redirect:'manual' so a 302→/login doesn't silently become a 200.
      try {
        var probe = await fetch('/', {
          method: 'HEAD',
          headers: { Authorization: cookieValue },
          cache: 'no-store',
          credentials: 'omit',
          redirect: 'manual',
        });

        // status 0 = opaque redirect (wrong creds → 302 to /login)
        // anything other than 2xx is also a failure
        if (probe.status === 0 || probe.status < 200 || probe.status >= 300) {
          errorEl.textContent = 'Incorrect username or password.';
          errorEl.classList.add('visible');
          btn.disabled = false;
          return;
        }
      } catch (_) {
        // Network error — set the cookie anyway and let the main page handle it
      }

      // Store just the base64 token (no 'Basic ' prefix) to avoid space/encoding issues in cookie transmission
      document.cookie = '_auth=' + token + '; path=/; SameSite=Strict';
      window.location.replace('/');
    });
  </script>
</body>
</html>
